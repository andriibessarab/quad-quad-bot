limb_controller:
  ros__parameters:
    action_server_name: "/joint_trajectory_controller/follow_joint_trajectory"
    joints:  # must match names in controllers.yaml
      - haa_joint
      - hfe_joint
      - knee_joint
    l1_len: 0.05  # hip offset (m)
    l2_len: 0.05  # femur length (m)
    l3_len: 0.05  # tibia Length (m)
