locomotion_commander:
  ros__parameters:
    # joints and limbs names and order must match in controllers.yaml
    joints:
      - haa_joint
      - hfe_joint
      - kfe_joint
    limb_prefixes:
      - fr
      - fl
      - br
      - bl
    limb_info:  # needed to account for inversions
      fr:
        is_right: true
        is_back: false
      fl:
        is_right: false
        is_back: false
      br:
        is_right: true
        is_back: true
      bl:
        is_right: false
        is_back: true
    l1_len: 0.02088  # hip offset (m)
    l2_len: 0.046  # femur length (m)
    l3_len: 0.048  # tibia Length (m)
    command_dispatch_frequency: 100.0  #Hz
