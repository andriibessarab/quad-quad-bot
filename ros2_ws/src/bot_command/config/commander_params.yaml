locomotion_commander:
  ros__parameters:
    limb_prefixes:  # must match names in controllers.yaml
      - fr
      - fl
      - br
      - bl
    joints:  # must match names in controllers.yaml
      - haa_joint
      - hfe_joint
      - kfe_joint
    l1_len: 0.02088  # hip offset (m)
    l2_len: 0.046  # femur length (m)
    l3_len: 0.048  # tibia Length (m)
    command_dispatch_frequency: 100.0  #Hz
