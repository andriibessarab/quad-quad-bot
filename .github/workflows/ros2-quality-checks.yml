name: ros2-quality-checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ros2_ws/quality-requirements.txt

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r ros2_ws/quality-requirements.txt
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run quality checks
        run: ros2_ws/scripts/quality.sh check
